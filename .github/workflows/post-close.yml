name: Post Close Scan

on:
  schedule:
    # Early EDT wakeup; the schedule gate waits until 4:20 PM America/New_York.
    - cron: "42 14 * * 1-5"
    # Backup EDT wakeup in case GitHub misses the early trigger.
    - cron: "0 20 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: swingsuite-post-close
  cancel-in-progress: false

jobs:
  post-close:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
      ALPACA_DATA_BASE_URL: https://data.alpaca.markets
      ALPACA_FEED: iex
      ALPACA_OPTION_FEED: indicative
      FREE_MODE: "true"
      ALLOW_TECHNICAL_WATCH: "true"
      TELEGRAM_BOT_USERNAME: AlisScreenerBot
      TELEGRAM_BOT_URL: https://t.me/AlisScreenerBot
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      STORAGE_BACKEND: local_json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Wait until 4:20 PM ET
        run: python -m scanner.schedule_gate --target 16:20 --max-late-minutes 20
      - name: Run post close scan
        run: python -m scanner.run_scan post_close
      - name: Hold schedule window
        run: python -m scanner.schedule_gate --target 16:20 --max-late-minutes 20 --hold-window-open
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-close-report
          path: |
            reports/post_close/latest.md
            reports/post_close/latest.json
            logs/notifications.log
          if-no-files-found: ignore
