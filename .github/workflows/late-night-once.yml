name: One Time Late Night Scan

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/late-night-once.yml

permissions:
  contents: read

concurrency:
  group: swingsuite-late-night-once
  cancel-in-progress: false

jobs:
  late-night-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
      ALPACA_DATA_BASE_URL: https://data.alpaca.markets
      ALPACA_FEED: iex
      ALPACA_OPTION_FEED: indicative
      ALPACA_MIN_REQUEST_INTERVAL_SECONDS: "0.45"
      ALPACA_MAX_RETRIES: "8"
      MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
      TELEGRAM_BOT_USERNAME: AlisScreenerBot
      TELEGRAM_BOT_URL: https://t.me/AlisScreenerBot
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      STORAGE_BACKEND: local_json
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run one time late night scan
        run: python -m scanner.run_scan daily_prep
      - name: Upload late night report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: late-night-scan-report
          path: |
            reports/post_close/latest.md
            reports/post_close/latest.json
            reports/post_close/latest.html
            reports/charts/*.png
            data/research/research.sqlite3
            logs/notifications.log
          if-no-files-found: ignore
