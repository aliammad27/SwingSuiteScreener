name: Four Hour Refresh

on:
  schedule:
    # Primary: fires 30 min before 1:35 PM ET (EDT=17:05 UTC, EST=18:05 UTC).
    # Gate waits the remaining minutes; rejects if GitHub starts > 30 min late.
    - cron: "5 17 * * 1-5"
    # Backup: fires 20 min after target (EDT=17:55 UTC). Same 30-min gate tolerance.
    # Concurrency hold ensures this is rejected if the primary already succeeded.
    # If the primary got no runner, this backup delivers the refresh instead.
    - cron: "55 17 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: swingsuite-four-hour
  cancel-in-progress: false

jobs:
  four-hour:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
      ALPACA_DATA_BASE_URL: https://data.alpaca.markets
      ALPACA_FEED: iex
      ALPACA_OPTION_FEED: indicative
      ALPACA_MIN_REQUEST_INTERVAL_SECONDS: "0.45"
      ALPACA_MAX_RETRIES: "8"
      FREE_MODE: "true"
      ALLOW_TECHNICAL_WATCH: "true"
      TELEGRAM_BOT_USERNAME: AlisScreenerBot
      TELEGRAM_BOT_URL: https://t.me/AlisScreenerBot
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      STORAGE_BACKEND: local_json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Wait until 1:35 PM ET
        if: github.event_name == 'schedule'
        run: python -m scanner.schedule_gate --target 13:35 --max-late-minutes 90
      - name: Run four hour refresh
        run: python -m scanner.run_scan four_hour
      - name: Hold schedule window
        if: github.event_name == 'schedule'
        run: python -m scanner.schedule_gate --target 13:35 --max-late-minutes 90 --hold-window-open
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: four-hour-report
          path: |
            reports/four_hour/latest.md
            reports/four_hour/latest.json
            logs/notifications.log
          if-no-files-found: ignore
