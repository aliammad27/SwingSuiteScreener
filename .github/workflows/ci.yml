name: V5 CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Ruff
        run: python -m ruff check .
      - name: Mypy
        run: python -m mypy scanner
      - name: Tests
        run: python -m pytest -q
      - name: Pine parity
        run: python scripts/check_pine_parity.py
      - name: Release audit
        run: python scripts/release_audit.py
      - name: Fixture smoke scans
        run: |
          python -m scanner.run_scan validate_configuration --fixture
          python -m scanner.run_scan intraday --fixture --scenario ready
          python -m scanner.run_scan post_close --fixture --scenario ready
          python -m scanner.run_scan premarket --fixture --scenario technical_watch
          python -m scanner.run_scan replay --fixture --symbol SPY --horizon 5
