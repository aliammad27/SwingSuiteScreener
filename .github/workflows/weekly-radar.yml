name: Weekly Radar

on:
  schedule:
    # Early EDT wakeup; the schedule gate waits until Sunday 8:00 PM America/New_York.
    - cron: "22 18 * * 0"
    # Backup EDT wakeup in case GitHub misses the early trigger.
    - cron: "40 23 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: swingsuite-weekly-radar
  cancel-in-progress: false

jobs:
  weekly-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
      ALPACA_DATA_BASE_URL: https://data.alpaca.markets
      ALPACA_FEED: iex
      ALPACA_OPTION_FEED: indicative
      FREE_MODE: "true"
      ALLOW_TECHNICAL_WATCH: "true"
      TELEGRAM_BOT_USERNAME: AlisScreenerBot
      TELEGRAM_BOT_URL: https://t.me/AlisScreenerBot
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      STORAGE_BACKEND: local_json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Wait until 8:00 PM ET
        run: python -m scanner.schedule_gate --target 20:00 --max-late-minutes 20
      - name: Send weekly radar
        run: python -m scanner.run_scan weekly_radar
      - name: Hold schedule window
        run: python -m scanner.schedule_gate --target 20:00 --max-late-minutes 20 --hold-window-open
      - name: Upload weekly radar artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-radar-report
          path: |
            reports/post_close/latest.md
            reports/post_close/latest.json
            reports/charts/*.png
            logs/notifications.log
          if-no-files-found: ignore
