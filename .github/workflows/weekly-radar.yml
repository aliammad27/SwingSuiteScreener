name: Weekly Radar

on:
  schedule:
    # Primary: fires 30 min before 8:00 PM ET Sunday (EDT=23:30 UTC Sun, EST=00:30 UTC Mon).
    # Gate waits the remaining minutes; rejects if GitHub starts > 30 min late.
    - cron: "30 23 * * 0"
    # Backup: fires 20 min after target (EDT=00:20 UTC Mon). Same 30-min gate tolerance.
    # Concurrency hold ensures this is rejected if the primary already succeeded.
    # If the primary got no runner, this backup delivers the radar instead.
    - cron: "20 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: swingsuite-weekly-radar
  cancel-in-progress: false

jobs:
  weekly-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
      ALPACA_DATA_BASE_URL: https://data.alpaca.markets
      ALPACA_FEED: iex
      ALPACA_OPTION_FEED: indicative
      ALPACA_MIN_REQUEST_INTERVAL_SECONDS: "0.45"
      ALPACA_MAX_RETRIES: "8"
      FREE_MODE: "true"
      ALLOW_TECHNICAL_WATCH: "true"
      TELEGRAM_BOT_USERNAME: AlisScreenerBot
      TELEGRAM_BOT_URL: https://t.me/AlisScreenerBot
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      STORAGE_BACKEND: local_json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Wait until 8:00 PM ET
        if: github.event_name == 'schedule'
        run: python -m scanner.schedule_gate --target 20:00 --max-late-minutes 90
      - name: Send weekly radar
        run: python -m scanner.run_scan weekly_radar
      - name: Hold schedule window
        if: github.event_name == 'schedule'
        run: python -m scanner.schedule_gate --target 20:00 --max-late-minutes 90 --hold-window-open
      - name: Upload weekly radar artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-radar-report
          path: |
            reports/post_close/latest.md
            reports/post_close/latest.json
            reports/charts/*.png
            logs/notifications.log
          if-no-files-found: ignore
