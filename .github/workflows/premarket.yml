name: Premarket Validation

on:
  schedule:
    # Primary: fires 15 min before 8:45 AM ET (EDT=12:30 UTC, EST=13:30 UTC).
    # Gate waits the remaining minutes; rejects if GitHub starts > 30 min late.
    - cron: "30 12 * * 1-5"
    # Backup: fires 20 min after target (EDT=13:05 UTC). Same 30-min gate tolerance.
    # Concurrency hold ensures this is rejected if the primary already succeeded.
    # If the primary got no runner, this backup delivers the notification instead.
    - cron: "5 13 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: swingsuite-premarket
  cancel-in-progress: false

jobs:
  premarket:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
      ALPACA_DATA_BASE_URL: https://data.alpaca.markets
      ALPACA_FEED: iex
      ALPACA_OPTION_FEED: indicative
      ALPACA_MIN_REQUEST_INTERVAL_SECONDS: "0.45"
      ALPACA_MAX_RETRIES: "8"
      FREE_MODE: "true"
      ALLOW_TECHNICAL_WATCH: "true"
      TELEGRAM_BOT_USERNAME: AlisScreenerBot
      TELEGRAM_BOT_URL: https://t.me/AlisScreenerBot
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      STORAGE_BACKEND: local_json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Wait until 8:45 AM ET
        if: github.event_name == 'schedule'
        run: python -m scanner.schedule_gate --target 08:45 --max-late-minutes 30
      - name: Run premarket validation
        run: python -m scanner.run_scan premarket
      - name: Hold schedule window
        if: github.event_name == 'schedule'
        run: python -m scanner.schedule_gate --target 08:45 --max-late-minutes 30 --hold-window-open
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: premarket-report
          path: |
            reports/premarket/latest.md
            reports/premarket/latest.json
            logs/notifications.log
          if-no-files-found: ignore
