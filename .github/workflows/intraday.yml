name: V5 Intraday Scans

on:
  schedule:
    # Covers 10:35 AM through 3:35 PM ET across EDT and EST. The local-time gate
    # rejects the extra UTC wakeups and starts later than 30 minutes.
    - cron: "35 14-21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: swingsuite-intraday
  cancel-in-progress: false

jobs:
  intraday:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
      ALPACA_DATA_BASE_URL: https://data.alpaca.markets
      ALPACA_FEED: sip
      ALPACA_OPTION_FEED: opra
      ALPACA_MIN_REQUEST_INTERVAL_SECONDS: "0.45"
      ALPACA_MAX_RETRIES: "8"
      MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
      TELEGRAM_BOT_USERNAME: AlisScreenerBot
      TELEGRAM_BOT_URL: https://t.me/AlisScreenerBot
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      STORAGE_BACKEND: local_json
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Restore scanner state
        uses: actions/cache/restore@v5
        with:
          path: |
            data/state
            data/research
          key: swingsuite-state-${{ github.run_id }}
          restore-keys: |
            swingsuite-state-
      - name: Check configured ET scan window
        id: gate
        if: github.event_name == 'schedule'
        run: python -m scanner.intraday_schedule_gate
      - name: Run completed-hour scan
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.should_run == 'true'
        run: python -m scanner.run_scan intraday
      - name: Save scanner state
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            data/state
            data/research
          key: swingsuite-state-${{ github.run_id }}
      - name: Upload intraday report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: intraday-report
          path: |
            reports/intraday/latest.md
            reports/intraday/latest.json
            reports/intraday/latest.html
            data/research/research.sqlite3
            logs/notifications.log
          if-no-files-found: ignore
