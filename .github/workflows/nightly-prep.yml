name: Nightly Prep

on:
  schedule:
    # 9:00 PM America/New_York during daylight saving time.
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: swingsuite-nightly-prep
  cancel-in-progress: false

jobs:
  nightly-prep:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
      ALPACA_DATA_BASE_URL: https://data.alpaca.markets
      ALPACA_FEED: iex
      ALPACA_OPTION_FEED: indicative
      FREE_MODE: "true"
      ALLOW_TECHNICAL_WATCH: "true"
      TELEGRAM_BOT_USERNAME: AlisScreenerBot
      TELEGRAM_BOT_URL: https://t.me/AlisScreenerBot
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      STORAGE_BACKEND: local_json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Send next-session prep
        run: python -m scanner.run_scan daily_prep
      - name: Upload notification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-prep-report
          path: |
            reports/post_close/latest.md
            reports/post_close/latest.json
            logs/notifications.log
          if-no-files-found: ignore
