name: Nightly Prep

on:
  schedule:
    # Primary EDT wakeup; the schedule gate waits until 9:00 PM America/New_York.
    # Strict: gate rejects if GitHub starts this more than 20 minutes late.
    - cron: "22 19 * * *"
    # First backup: fires ~20 min before target. Lenient: allows up to 4-hour late start
    # so nightly prep still sends even if GitHub delays this trigger until midnight.
    - cron: "40 0 * * *"
    # Second backup: fires ~2.5 hours after target. Catches cases where GitHub delays
    # both earlier triggers by several hours.
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: swingsuite-nightly-prep
  cancel-in-progress: false

jobs:
  nightly-prep:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
      ALPACA_DATA_BASE_URL: https://data.alpaca.markets
      ALPACA_FEED: iex
      ALPACA_OPTION_FEED: indicative
      ALPACA_MIN_REQUEST_INTERVAL_SECONDS: "0.45"
      ALPACA_MAX_RETRIES: "8"
      FREE_MODE: "true"
      ALLOW_TECHNICAL_WATCH: "true"
      TELEGRAM_BOT_USERNAME: AlisScreenerBot
      TELEGRAM_BOT_URL: https://t.me/AlisScreenerBot
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      STORAGE_BACKEND: local_json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Wait until 9:00 PM ET
        if: github.event_name == 'schedule'
        run: |
          # Primary cron is strict (20 min tolerance) to avoid sending stale very-early prep.
          # Backup crons allow up to 4 hours late so prep still sends even at midnight.
          if [ "${{ github.event.schedule }}" = "22 19 * * *" ]; then
            python -m scanner.schedule_gate --target 21:00 --max-late-minutes 20
          else
            python -m scanner.schedule_gate --target 21:00 --max-late-minutes 240
          fi
      - name: Send next-session prep
        run: python -m scanner.run_scan daily_prep
      - name: Hold schedule window
        if: github.event_name == 'schedule'
        run: |
          if [ "${{ github.event.schedule }}" = "22 19 * * *" ]; then
            python -m scanner.schedule_gate --target 21:00 --max-late-minutes 20 --hold-window-open
          else
            python -m scanner.schedule_gate --target 21:00 --max-late-minutes 240 --hold-window-open
          fi
      - name: Upload notification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-prep-report
          path: |
            reports/post_close/latest.md
            reports/post_close/latest.json
            reports/charts/*.png
            logs/notifications.log
          if-no-files-found: ignore
