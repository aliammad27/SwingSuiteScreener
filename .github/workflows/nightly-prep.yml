name: Nightly Prep

on:
  schedule:
    # Primary: fires 30 min before 9:00 PM ET (EDT=00:30 UTC, EST=01:30 UTC).
    # Gate waits the remaining minutes; rejects if GitHub starts > 60 min late.
    - cron: "30 0 * * *"
    # Backup: fires 50 min after target (EDT=01:50 UTC). Same 60-min gate tolerance.
    # Concurrency hold ensures this is rejected if the primary already succeeded.
    # If the primary got no runner, this backup delivers the prep instead.
    - cron: "50 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: swingsuite-nightly-prep
  cancel-in-progress: false

jobs:
  nightly-prep:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
      ALPACA_DATA_BASE_URL: https://data.alpaca.markets
      ALPACA_FEED: iex
      ALPACA_OPTION_FEED: indicative
      ALPACA_MIN_REQUEST_INTERVAL_SECONDS: "0.45"
      ALPACA_MAX_RETRIES: "8"
      TELEGRAM_BOT_USERNAME: AlisScreenerBot
      TELEGRAM_BOT_URL: https://t.me/AlisScreenerBot
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      STORAGE_BACKEND: local_json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Restore scanner state
        uses: actions/cache/restore@v4
        with:
          path: |
            data/state
            data/research
          key: swingsuite-state-${{ github.run_id }}
          restore-keys: |
            swingsuite-state-
      - name: Skip backup wakeup if already delivered
        if: github.event_name == 'schedule'
        id: dedupe
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cutoff=$(date -u -d '6 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          count=$(gh run list --workflow "${{ github.workflow }}" --event schedule --status success --limit 10 \
            --json createdAt --jq "[.[] | select(.createdAt >= \"$cutoff\")] | length" 2>/dev/null || echo 0)
          if [ "${count:-0}" -gt 0 ]; then
            echo "A scheduled run of this workflow already succeeded in the current window."
            echo "Skipping duplicate backup wakeup cleanly (no stale alert, no red failure)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No prior success in the current window; proceeding to the schedule gate."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Wait until 9:00 PM ET
        if: github.event_name == 'schedule' && steps.dedupe.outputs.skip != 'true'
        run: python -m scanner.schedule_gate --target 21:00 --max-late-minutes 360
      - name: Send next-session prep
        if: steps.dedupe.outputs.skip != 'true'
        run: python -m scanner.run_scan daily_prep
      - name: Hold schedule window
        if: github.event_name == 'schedule' && steps.dedupe.outputs.skip != 'true'
        run: python -m scanner.schedule_gate --target 21:00 --max-late-minutes 360 --hold-max-late-minutes 90 --hold-window-open
      - name: Save scanner state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/state
            data/research
          key: swingsuite-state-${{ github.run_id }}
      - name: Upload notification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-prep-report
          path: |
            reports/post_close/latest.md
            reports/post_close/latest.json
            reports/post_close/latest.html
            reports/charts/*.png
            data/research/research.sqlite3
            logs/notifications.log
          if-no-files-found: ignore
