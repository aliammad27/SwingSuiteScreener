services:
  - type: cron
    name: swingsuite-post-close
    runtime: docker
    schedule: "20 21 * * 1-5"
    dockerCommand: "python -m scanner.run_scan post_close"
  - type: cron
    name: swingsuite-premarket
    runtime: docker
    schedule: "45 12 * * 1-5"
    dockerCommand: "python -m scanner.run_scan premarket"
  - type: cron
    name: swingsuite-intraday
    runtime: docker
    schedule: "35 14-21 * * 1-5"
    dockerCommand: "python -m scanner.run_scan intraday"
